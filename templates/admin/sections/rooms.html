<div class="card mb-4 fc-section-card">
    <div class="card-header">
        <i class="material-icons">meeting_room</i>
        <span>Rooms</span>
    </div>
    <div class="card-body">
        {% if rooms %}
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th style="width: 140px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for room in rooms %}
                    <tr>
                        <td>{{ room.name }}</td>
                        <td>
                            <button class="btn toolbar-btn btn-sm delete-room-btn" data-room-id="{{ room.pk }}">
                                <i class="material-icons">delete</i>
                                <span class="toolbar-btn-label">Delete</span>
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <p class="text-muted mb-0">No rooms created yet.</p>
        {% endif %}

        <div class="control-toolbar mt-3">
            <button class="btn toolbar-btn" data-bs-toggle="modal" data-bs-target="#addRoomModal">
                <i class="material-icons">add</i>
                <span class="toolbar-btn-label">Add Room</span>
            </button>
        </div>

        <div class="fc-import-box">
            <h6 class="mb-2 d-flex align-items-center gap-1">
                <i class="material-icons" style="font-size:1rem;">upload_file</i> Bulk Import
            </h6>
            <div class="control-toolbar">
                <a href="{% url 'events:download_rooms_template' %}" class="btn toolbar-btn btn-sm">
                    <i class="material-icons">download</i>
                    <span class="toolbar-btn-label">Template</span>
                </a>
                <form method="post" action="{% url 'events:import_rooms_csv' convention.pk %}" enctype="multipart/form-data"
                      class="d-flex flex-wrap gap-2 align-items-center">
                    {% csrf_token %}
                    <input type="file" name="csv_file" accept=".csv" class="form-control form-control-sm" style="width: auto;" required>
                    <button type="submit" class="btn toolbar-btn btn-sm">
                        <i class="material-icons">upload</i>
                        <span class="toolbar-btn-label">Import CSV</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addRoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Room</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label for="roomName" class="form-label">Room Name</label>
                <input type="text" class="form-control" id="roomName" placeholder="e.g., Main Hall">
            </div>
            <div class="modal-footer control-toolbar justify-content-end">
                <button type="button" class="btn toolbar-btn" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn toolbar-btn active" id="saveRoomBtn">Save</button>
            </div>
        </div>
    </div>
</div>

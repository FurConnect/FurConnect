<div class="card mb-4 fc-section-card">
    <div class="card-header">
        <i class="material-icons">people</i>
        <span>Panel Hosts</span>
    </div>
    <div class="card-body">
        <div id="hostsLoading" class="text-muted mb-0">Loading hosts...</div>
        <div id="hostsEmpty" class="text-muted mb-0 d-none">No hosts created yet.</div>
        <div id="hostsTableWrap" class="table-responsive d-none">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Panels</th>
                        <th style="width: 200px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="hostsTableBody"></tbody>
            </table>
        </div>

        <div class="control-toolbar mt-3">
            <button class="btn toolbar-btn" data-bs-toggle="modal" data-bs-target="#addHostModal">
                <i class="material-icons">add</i>
                <span class="toolbar-btn-label">Add Host</span>
            </button>
        </div>

        <div class="fc-import-box">
            <h6 class="mb-2 d-flex align-items-center gap-1">
                <i class="material-icons" style="font-size:1rem;">upload_file</i> Bulk Import
            </h6>
            <div class="control-toolbar">
                <a href="{% url 'events:download_hosts_template' %}" class="btn toolbar-btn btn-sm">
                    <i class="material-icons">download</i>
                    <span class="toolbar-btn-label">Template</span>
                </a>
                <form method="post" action="{% url 'events:import_hosts_csv' convention.pk %}" enctype="multipart/form-data"
                      class="d-flex flex-wrap gap-2 align-items-center">
                    {% csrf_token %}
                    <input type="file" name="csv_file" accept=".csv" class="form-control form-control-sm" style="width: auto;" required>
                    <button type="submit" class="btn toolbar-btn btn-sm">
                        <i class="material-icons">upload</i>
                        <span class="toolbar-btn-label">Import CSV</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addHostModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Host</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label for="hostName" class="form-label">Host Name</label>
                <input type="text" class="form-control" id="hostName" placeholder="e.g., John Doe">
            </div>
            <div class="modal-footer control-toolbar justify-content-end">
                <button type="button" class="btn toolbar-btn" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn toolbar-btn active" id="saveHostBtn">Save</button>
            </div>
        </div>
    </div>
</div>

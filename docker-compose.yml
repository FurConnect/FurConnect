services:
  db:
    restart: unless-stopped
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: furconnect
      POSTGRES_USER: furconnect
      POSTGRES_PASSWORD: furconnect
    ports:
      - ":5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DB_NAME: furconnect
      DB_USER: furconnect
      DB_PASSWORD: furconnect
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume: